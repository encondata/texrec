services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-texrec}
      POSTGRES_USER: ${PGUSER:-texrec}
      POSTGRES_PASSWORD: ${PGPASSWORD:-texrec}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-texrec} -d ${PGDATABASE:-texrec}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-texrec}
      PGUSER: ${PGUSER:-texrec}
      PGPASSWORD: ${PGPASSWORD:-texrec}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      ADMIN_TOKEN_HOURS: ${ADMIN_TOKEN_HOURS:-12}
      CUSTOMER_TOKEN_DAYS: ${CUSTOMER_TOKEN_DAYS:-7}
      # first-boot admin account (change the password after first login!)
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@texrec.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-change-me-now}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-TexRec Admin}
    ports:
      - "${HOST_PORT:-80}:3000"
    volumes:
      - media:/app/media
      - uploads:/app/public/uploads

volumes:
  pgdata:
  media:
  uploads:
